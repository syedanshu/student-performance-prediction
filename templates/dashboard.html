<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- IMPORTANT FIX -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.card-box {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
}

h1 {
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Student Dashboard</h1>

<select id="branchFilter" class="form-select mb-3">
<option value="All">All</option>
<option value="CSE">CSE</option>
<option value="ISE">ISE</option>
<option value="ECE">ECE</option>
<option value="MECH">MECH</option>
</select>

<div class="card-box"><div id="g1">{{ graph1|safe }}</div></div>
<div class="card-box"><div id="g2">{{ graph2|safe }}</div></div>
<div class="card-box"><div id="g3">{{ graph3|safe }}</div></div>
<div class="card-box"><div id="g4">{{ graph4|safe }}</div></div>

<div class="text-center">
<a href="/" class="btn btn-light">⬅ Back</a>
</div>

</div>

<script>
document.getElementById("branchFilter").addEventListener("change", function(){
    let branch = this.value;

    fetch(`/get-data?branch=${branch}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("g1").innerHTML = data.graph1;
        document.getElementById("g2").innerHTML = data.graph2;
        document.getElementById("g3").innerHTML = data.graph3;
        document.getElementById("g4").innerHTML = data.graph4;
    });
});
</script>

</body>
</html>
