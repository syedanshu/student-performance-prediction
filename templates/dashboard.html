<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- REQUIRED -->
<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.card-box {
    background: white;
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
}

h1 {
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Student Dashboard</h1>

<select id="branchFilter" class="form-select mb-3">
<option value="All">All</option>
<option value="CSE">CSE</option>
<option value="ISE">ISE</option>
<option value="ECE">ECE</option>
<option value="MECH">MECH</option>
</select>

<div class="card-box"><div id="g1"></div></div>
<div class="card-box"><div id="g2"></div></div>
<div class="card-box"><div id="g3"></div></div>
<div class="card-box"><div id="g4"></div></div>

<div class="text-center">
<a href="/" class="btn btn-light">⬅ Back</a>
</div>

</div>

<script>
// INITIAL LOAD
let g1 = JSON.parse('{{ graph1|safe }}');
let g2 = JSON.parse('{{ graph2|safe }}');
let g3 = JSON.parse('{{ graph3|safe }}');
let g4 = JSON.parse('{{ graph4|safe }}');

Plotly.newPlot("g1", g1.data, g1.layout);
Plotly.newPlot("g2", g2.data, g2.layout);
Plotly.newPlot("g3", g3.data, g3.layout);
Plotly.newPlot("g4", g4.data, g4.layout);

// REAL-TIME FILTER
document.getElementById("branchFilter").addEventListener("change", function(){
    let branch = this.value;

    fetch(`/get-data?branch=${branch}`)
    .then(res => res.json())
    .then(data => {
        if (data.graph1) {
            let g1 = JSON.parse(data.graph1);
            let g2 = JSON.parse(data.graph2);
            let g3 = JSON.parse(data.graph3);
            let g4 = JSON.parse(data.graph4);

            Plotly.newPlot("g1", g1.data, g1.layout);
            Plotly.newPlot("g2", g2.data, g2.layout);
            Plotly.newPlot("g3", g3.data, g3.layout);
            Plotly.newPlot("g4", g4.data, g4.layout);
        } else {
            document.getElementById("g1").innerHTML = "<h4>No Data</h4>";
        }
    });
});
</script>

</body>
</html>
