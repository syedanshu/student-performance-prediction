<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}
h1 {
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Student Dashboard</h1>

<form method="get" action="/dashboard">
<select name="branch" class="form-select mb-3" onchange="this.form.submit()">
<option value="All">All</option>
<option value="CSE">CSE</option>
<option value="ISE">ISE</option>
<option value="ECE">ECE</option>
<option value="MECH">MECH</option>
</select>
</form>

<p style="color:white;">Selected: {{ selected_branch }}</p>

<!-- KPIs -->
<div class="row mb-3">
    <div class="col-md-3"><div class="card">Avg: {{ avg_score }}</div></div>
    <div class="col-md-3"><div class="card">Max: {{ max_score }}</div></div>
    <div class="col-md-3"><div class="card">Students: {{ total_students }}</div></div>
    <div class="col-md-3"><div class="card">Top Branch: {{ top_branch }}</div></div>
</div>

<div class="card">{{ g1|safe }}</div>
<div class="card">{{ g2|safe }}</div>
<div class="card">{{ g3|safe }}</div>
<div class="card">{{ g4|safe }}</div>

<br>
<a href="/cgpa"><button>Back</button></a>

</div>

</body>
</html>
