<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

<style>
body {
    background: linear-gradient(135deg, #667eea, #764ba2);
}
.card {
    background: white;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}
h1 {
    color: white;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<h1>📊 Student Dashboard</h1>

<select id="filter" class="form-select mb-3">
<option>All</option>
<option>CSE</option>
<option>ISE</option>
<option>ECE</option>
<option>MECH</option>
</select>

<div class="card"><div id="g1"></div></div>
<div class="card"><div id="g2"></div></div>
<div class="card"><div id="g3"></div></div>
<div class="card"><div id="g4"></div></div>

</div>

<script>
// initial render
function draw(id, fig){
    Plotly.newPlot(id, fig.data, fig.layout);
}

draw("g1", JSON.parse('{{ g1|safe }}'));
draw("g2", JSON.parse('{{ g2|safe }}'));
draw("g3", JSON.parse('{{ g3|safe }}'));
draw("g4", JSON.parse('{{ g4|safe }}'));

// filter
document.getElementById("filter").addEventListener("change", function(){
    fetch(`/get-data?branch=${this.value}`)
    .then(r=>r.json())
    .then(data=>{
        if(data.empty){
            document.getElementById("g1").innerHTML = "No Data";
            return;
        }
        draw("g1", JSON.parse(data.g1));
        draw("g2", JSON.parse(data.g2));
        draw("g3", JSON.parse(data.g3));
        draw("g4", JSON.parse(data.g4));
    });
});
</script>

</body>
</html>
