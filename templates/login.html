<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #5a67d8;
}
</style>
</head>

<body>

<div class="box">
<h2>🔐 Login Portal</h2>

<form method="POST">
<input type="text" name="username" placeholder="👤 Username" required>
<input type="password" name="password" placeholder="🔑 Password" required>

<button type="submit">🚀 Login</button>
</form>

</div>

</body>
</html>
